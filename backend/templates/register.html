<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARLION – Registrácia</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0ebe3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fffdf8;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
        }
        .logo { font-size: 28px; font-weight: 800; color: #1f2933; letter-spacing: -1px; margin-bottom: 4px; }
        .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 10px; }
        .trial-badge {
            display: inline-block;
            background: #d1fae5;
            color: #065f46;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 999px;
            margin-bottom: 28px;
        }
        label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #d1cfc9;
            border-radius: 10px;
            font-size: 15px;
            background: #faf9f7;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 18px;
        }
        input:focus { border-color: #c9a84c; }
        .hint { font-size: 12px; color: #9ca3af; margin-top: -14px; margin-bottom: 16px; }
        button[type="submit"] {
            width: 100%;
            padding: 13px;
            background: #1f2933;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }
        button[type="submit"]:hover { background: #374151; }
        .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
        .login-link a { color: #1f2933; font-weight: 600; text-decoration: none; }
        #errorMsg { color: #dc2626; font-size: 13px; margin-top: 14px; text-align: center; min-height: 20px; }
        #successMsg {
            display: none;
            background: #d1fae5;
            color: #065f46;
            border-radius: 10px;
            padding: 16px;
            font-size: 14px;
            text-align: center;
            margin-top: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🚚 CARLION</div>
        <div class="subtitle">Správa vozového parku</div>
        <div class="trial-badge">✅ 30 dní zadarmo – bez platobnej karty</div>
        <form id="regForm" onsubmit="doRegister(event)">
            <label for="username">Používateľské meno</label>
            <input type="text" id="username" autocomplete="username" placeholder="jan.novak" required>
            <label for="email">Email</label>
            <input type="email" id="email" autocomplete="email" placeholder="jan@firma.sk" required>
            <label for="password">Heslo</label>
            <input type="password" id="password" autocomplete="new-password" placeholder="minimálne 6 znakov" required>
            <div class="hint">Aspoň 6 znakov</div>
            <label for="password2">Heslo znova</label>
            <input type="password" id="password2" autocomplete="new-password" placeholder="zopakuj heslo" required>
            <button type="submit" id="regBtn">Vytvoriť účet zdarma</button>
        </form>
        <div id="errorMsg"></div>
        <div id="successMsg"></div>
        <div class="login-link">Už máš účet? <a href="/login">Prihlásiť sa</a></div>
    </div>

    <script>
        async function doRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const err = document.getElementById('errorMsg');
            const suc = document.getElementById('successMsg');
            err.textContent = '';
            suc.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            if (password !== password2) { err.textContent = 'Heslá sa nezhodujú'; return; }
            if (password.length < 6) { err.textContent = 'Heslo musí mať aspoň 6 znakov'; return; }

            btn.disabled = true;
            btn.textContent = 'Vytváranie účtu...';

            const resp = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await resp.json();

            if (!resp.ok) {
                err.textContent = data.detail || 'Registrácia zlyhala';
                btn.disabled = false;
                btn.textContent = 'Vytvoriť účet zdarma';
                return;
            }

            suc.style.display = 'block';
            suc.innerHTML = `📧 Poslali sme overovací email na <strong>${data.email}</strong>.<br>
                Otvor email a klikni na overovací odkaz.<br><br>
                Po overení sa môžeš prihlásiť.`;
            document.getElementById('regForm').style.display = 'none';
        }

        const qp = new URLSearchParams(location.search);
        const verifyError = qp.get('verify_error');
        if (verifyError) {
            const err = document.getElementById('errorMsg');
            if (verifyError === 'invalid_or_expired') {
                err.textContent = 'Overovací odkaz je neplatný alebo expiroval. Zaregistruj sa znova.';
            } else if (verifyError === 'email_used') {
                err.textContent = 'Tento email už je použitý.';
            }
        }
    </script>
</body>
</html>
