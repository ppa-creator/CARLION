<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARLION – Prihlásenie</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            border: 1px solid #e7e5e4;
            box-shadow: 0 10px 34px rgba(17, 24, 39, 0.08);
        }
        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        .logo-image {
            width: 100%;
            max-width: 320px;
            height: auto;
            object-fit: contain;
        }
        .day-info {
            margin: 0 0 24px;
            padding: 10px 14px;
            border-radius: 12px;
            background: #f5f7f8;
            color: #334155;
            font-size: 14px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #d1cfc9;
            border-radius: 10px;
            font-size: 15px;
            background: #faf9f7;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 18px;
        }
        input:focus { border-color: #c9a84c; }
        button[type="submit"] {
            width: 100%;
            padding: 13px;
            background: #1f2933;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }
        button[type="submit"]:hover { background: #374151; }
        #errorMsg {
            color: #dc2626;
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
            min-height: 20px;
        }
        #infoMsg {
            color: #065f46;
            background: #d1fae5;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            padding: 10px;
            display: none;
        }
        @media (max-width: 640px) {
            .login-card {
                padding: 30px 20px;
            }
            .logo-image {
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-wrap">
            <img class="logo-image" src="/static/logo-carlion.png" alt="CARLION logo" onerror="this.style.display='none'">
        </div>
        <div id="dayInfo" class="day-info">Načítavam denné info...</div>
        <form id="loginForm" onsubmit="doLogin(event)">
            <label for="username">Používateľské meno</label>
            <input type="text" id="username" autocomplete="username" required>
            <label for="password">Heslo</label>
            <input type="password" id="password" autocomplete="current-password" required>
            <button type="submit" id="loginBtn">Prihlásiť sa</button>
        </form>
        <div id="errorMsg"></div>
        <div id="infoMsg"></div>
        <div class="login-link" style="text-align:center; margin-top:20px; font-size:13px; color:#6b7280;">
            Nemáš účet? <a href="/register" style="color:#1f2933; font-weight:600;">Registrovať sa zadarmo</a>
        </div>
    </div>

    <script>
        const qp = new URLSearchParams(location.search);

        if (qp.get('expired')) {
            document.getElementById('errorMsg').innerHTML =
                '⏰ Skúšobná doba alebo predplatné vypršalo.<br>Kontaktuj administrátora pre obnovenie prístupu.';
        }

        if (qp.get('verified')) {
            const info = document.getElementById('infoMsg');
            info.style.display = 'block';
            info.innerHTML = '✅ Email bol overený. Teraz sa môžeš prihlásiť.';
        }

        (async function loadDayInfo() {
            const target = document.getElementById('dayInfo');
            const now = new Date();
            const day = now.getDate();
            const month = now.getMonth() + 1;
            const key = `${day}-${month}`;

            // Slovak fixed-date public holidays fallback.
            const holidays = {
                '1-1': 'Deň vzniku Slovenskej republiky',
                '6-1': 'Zjavenie Pána',
                '1-5': 'Sviatok práce',
                '8-5': 'Deň víťazstva nad fašizmom',
                '5-7': 'Sviatok svätého Cyrila a Metoda',
                '29-8': 'Výročie Slovenského národného povstania',
                '1-9': 'Deň Ústavy Slovenskej republiky',
                '15-9': 'Sedembolestná Panna Mária',
                '1-11': 'Sviatok Všetkých svätých',
                '17-11': 'Deň boja za slobodu a demokraciu',
                '24-12': 'Štedrý deň',
                '25-12': 'Prvý sviatok vianočný',
                '26-12': 'Druhý sviatok vianočný'
            };

            let nameday = null;
            try {
                const resp = await fetch(`https://nameday.abalin.net/api/V2/date?country=sk&day=${day}&month=${month}`);
                if (resp.ok) {
                    const data = await resp.json();
                    if (data && data.data && data.data.name) {
                        nameday = String(data.data.name).trim();
                    }
                }
            } catch (e) {
                // Ignore; holiday fallback below still works.
            }

            const holiday = holidays[key] || null;
            if (holiday && nameday) {
                target.textContent = `Dnes je sviatok: ${holiday}. Meniny má ${nameday}.`;
                return;
            }
            if (holiday) {
                target.textContent = `Dnes je sviatok: ${holiday}.`;
                return;
            }
            if (nameday) {
                target.textContent = `Meniny dnes má: ${nameday}`;
                return;
            }

            target.textContent = 'Prajem pekný deň.';
        })();

        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Prihlasujem...';
            err.textContent = '';

            const resp = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                })
            });

            if (resp.ok) {
                window.location.href = '/ui';
            } else {
                const data = await resp.json();
                if (data.detail === 'EXPIRED') {
                    err.innerHTML = 'Skúšobná doba alebo predplatné vypršalo.<br>Kontaktuj administrátora pre obnovenie prístupu.';
                } else if (data.detail === 'Účet je neaktívny alebo neoverený') {
                    err.innerHTML = 'Účet ešte nie je overený emailom alebo je deaktivovaný.<br>Skontroluj email a klikni na overovací odkaz.';
                } else {
                    err.textContent = data.detail || 'Prihlásenie zlyhalo';
                }
                btn.disabled = false;
                btn.textContent = 'Prihlásiť sa';
            }
        }
    </script>
</body>
</html>
